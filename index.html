<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS — Pixel Perfect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* [SEU CSS ORIGINAL - MANTIDO] */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background: radial-gradient(circle at top, #f391b78f, #cc7894 70%); overflow: hidden; }
        
        #bg-video { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
        .hearts { position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden; z-index:-1; pointer-events:none; }
        .heart { position:absolute; width:20px; height:20px; background: radial-gradient(circle, #ff9ebb, #ff4f92); transform: rotate(45deg); animation: fall linear infinite; opacity:0.7; border-radius: 4px; }
        .heart::before, .heart::after { content:""; position:absolute; width:20px; height:20px; background: inherit; border-radius:50%; }
        .heart::before { top:-10px; left:0; }
        .heart::after { left:-10px; top:0; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(45deg) scale(0.8); opacity:0; } 10% { opacity:0.8; } 100% { transform: translateY(110vh) rotate(45deg) scale(1); opacity:0; } }

        /* [ESTILOS DO PERFIL E TABS] */
        .wrapper { display:flex; align-items:center; gap:40px; position: relative; left: 150px; opacity: 0; transition: 1s; }
        .wrapper.show { opacity: 1; }
        .profile { position:relative; width:390px; height:400px; padding:180px 10px 30px; border-radius:25px; background: rgba(235, 143, 181, 0.37); backdrop-filter: blur(25px); border:1px solid rgba(139, 21, 60, 0.075); box-shadow:0 30px 60px rgba(63, 33, 33, 0.7); color:#fff; }
        .avatar { position:absolute; top:-45px; left:-178px; width:200px; height:200px; border-radius:50%; background: rgba(231, 149, 183, 0.6); overflow:hidden; border:21px solid #f3d3dfa1; z-index:20; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        
        .menu { position:absolute; top:-45px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background: rgba(241, 137, 177, 0.6); backdrop-filter: blur(15px); padding:6px; border-radius:26px; z-index: 30; }
        .menu span { font-size:12px; opacity:0.6; padding:6px 14px; border-radius:20px; cursor:pointer; transition:0.3s; }
        .menu .active { background:linear-gradient(90deg,#f798bf,#db859f); opacity:1; box-shadow:0 5px 15px rgba(255, 163, 201, 0.699); }

        /* [PLAYER E OUTROS] */
        .player { position: relative; top:80px; left:-602px; width:170px; padding:16px 15px 20px; border-radius:80px 80px 30px 30px; background: rgba(226, 147, 173, 0.6); backdrop-filter: blur(25px); text-align:center; }
        .player img { width:75px; height:75px; border-radius:50%; object-fit:cover; border:6px solid #d47096; animation:spin 6s linear infinite; animation-play-state: paused; }
        .player.playing img { animation-play-state: running; }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

        /* [ESTILO DAS TABS] */
        .tabs { position: relative; top:-70px; height:220px; }
        .tab { display:none; width:100%; height:100%; }
        .tab.active { display:block; animation: fade 0.5s ease; }
        @keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* [GALERIA] */
        .gallery-container { position:absolute; width:106%; height:280px; top:-95px; left:-12px; display:flex; justify-content:center; align-items:center; perspective:1200px; }
        .card-main { position:absolute; width:130px; height:190px; border-radius:18px; overflow:hidden; cursor:pointer; transition:0.6s; z-index:10; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); }
        .carousel { position:absolute; width:100%; height:100%; transform-style:preserve-3d; display:none; }
        .item { position:absolute; width:110px; height:150px; border-radius:18px; overflow:hidden; background:rgba(255,255,255,0.1); left:50%; top:50%; transition:1s; }
        .item img, .card-main img { width:100%; height:100%; object-fit:cover; }

        /* [MODAL MARRIED] */
        .married-modal { position:fixed; inset:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:0.4s; z-index:9999; }
        .married-modal.active { opacity:1; pointer-events:auto; }
        .married-content { width:480px; padding:26px 30px; border-radius:18px; background: rgba(233, 233, 233, 0.4); border:1px solid rgba(255,255,255,0.3); display:flex; justify-content:space-between; align-items:center; color:#fff; position:relative; }

        /* [CURSOR E PARTICULAS] */
        #heartCursor { position: fixed; width: 30px; height: 30px; pointer-events: none; z-index: 999999; background: url("https://xatimg.com/image/YbX9tnbfzNya.png") no-repeat center; background-size: contain; transform: translate(-50%, -50%); }
        .heart-particle { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 999998; background: #f56e97; transform: rotate(45deg); animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { to { transform: translateY(-15px) scale(0.5) rotate(45deg); opacity: 0; } }
        
        /* [BLOQUEIO DE CURSOR PADRÃO] */
        body, a, button, span { cursor: none !important; }

        /* [INTRO] */
        .intro { position:fixed; inset:0; background:#8f3c63; display:flex; justify-content:center; align-items:center; z-index:9999; transition:1s; }
        .intro.hide { opacity:0; pointer-events:none; }
        .enter-btn { padding:14px 40px; border-radius:30px; border:none; background:linear-gradient(90deg,#f579a8,#fc84b6); color:#fff; cursor:none; letter-spacing:2px; }

        /* Outros estilos omitidos para brevidade, mas mantidos na lógica */
        .name { text-align:center; font-size:35px; position: relative; top:-90px; background: linear-gradient(270deg, #fac8df, #ffc0da, #facee1, #ffbbdc); -webkit-background-clip: text; color: transparent; animation: gradientMove 6s ease infinite; }
        .id { position: relative; top: -88px; font-size:12px; text-align:center; opacity:0.5; }
        .message { position: absolute; top: 120px; width: 80%; left: 10%; background: rgba(255,255,255,0.05); border-radius:18px; padding:15px; text-align:center; font-size:11px; }
        .friends { display:grid; grid-template-columns:repeat(2, 160px); gap:10px; margin-top:20px; justify-content: center; }
        .friend { position: relative; top:-90px; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.1); padding:10px; border-radius:30px; }
        .avatar-friend { width:40px; height:40px; border-radius:50%; background:#e484a4; display:flex; justify-content:center; align-items:center; font-size:14px; }
        .nick { font-size:10px; }
    </style>
</head>
<body>  

<div class="intro" id="intro">
    <button class="enter-btn" id="enterBtn">INGRESAR</button>
</div> 

<div class="hearts">
    <div class="heart" style="left:10%; animation-duration:10s;"></div>
    <div class="heart" style="left:30%; animation-duration:15s;"></div>
    <div class="heart" style="left:50%; animation-duration:12s;"></div>
    <div class="heart" style="left:70%; animation-duration:18s;"></div>
    <div class="heart" style="left:90%; animation-duration:14s;"></div>
</div>

<div class="wrapper" id="mainWrapper">
    <div class="married-wrap" onclick="openMarried()" style="position:absolute; top:106px; left:-110px; cursor:none; z-index:100;">
        <div class="married-heart" style="width:20px; height:20px; background:red; transform:rotate(45deg); position:relative;"></div>
    </div>

    <div class="profile">
        <div class="avatar"><img src="https://xatimg.com/image/lu7HFLMYZjSz.png"></div>
        
        <div class="menu">
            <span class="active">PERFIL</span>
            <span>AMIGOS</span>
            <span>GALERÍA</span>
        </div>

        <div class="tabs">
            <div class="tab active" id="perfil">
                <div class="name">♥ 𝓨𝓪𝔃 ♥</div>
                <div class="id">Id: 666000</div>
                <div class="message"><span id="typing"></span><span class="cursor">|</span></div>
            </div>

            <div class="tab" id="amigos">
                <div class="friends">
                    <div class="friend"><div class="avatar-friend">AG</div><div class="nick">Angelita♥</div></div>
                    <div class="friend"><div class="avatar-friend">GB</div><div class="nick">Gaby♥</div></div>
                </div>
            </div>

            <div class="tab" id="galeria">
                <div class="gallery-container">
                    <div class="card-main" id="mainCard"><img src="https://xatimg.com/image/grsS9Sc9mchR.png"></div>
                    <div class="carousel" id="carousel">
                        <div class="item"><img src="https://xatimg.com/image/q1wHGSRCMb6h.png"></div>
                        <div class="item"><img src="https://xatimg.com/image/A8206pOzevE5.png"></div>
                        <div class="item"><img src="https://xatimg.com/image/qjOnEkwZVJ3F.png"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player">
        <img id="cover" src="https://xatimg.com/image/rQKnT3qeior8.jpg">
        <div class="song"><span id="artist">Artista</span><br><small id="title">Canción</small></div>
        <div class="controls">
            <button onclick="prev()">⏮</button>
            <button onclick="togglePlay()" id="playBtn">▶</button>
            <button onclick="next()">⏭</button>
        </div>
        <div class="progress-container" onclick="setProgress(event)"><div class="progress" id="progress"></div></div>
        <audio id="audio"></audio>
    </div>
</div>

<div class="married-modal" id="marriedModal">
    <div class="married-content">
        <div class="married-info">
            <h2>QR♥</h2>
            <p>ID: 1553193110</p>
            <span class="married-phrase"><span id="typingText"></span></span>
            <button class="married-xat" onclick="goXat()">xat.me</button>
        </div>
        <div class="married-avatar"><img src="https://xatimg.com/image/JVDjG98wVKej.jpg"></div>
    </div>
</div>

<div id="heartCursor"></div>

<script>
// --- LÓGICA DE MÚSICA ---
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const player = document.querySelector(".player");
const songs = [{ name: "song1.mp3", title: "Leave Em Alone", artist: "Layton Greene", cover: "https://xatimg.com/image/rQKnT3qeior8.jpg" }];
let index = 0; let playing = false;

function loadSong(song) {
    audio.src = "music/" + song.name;
    document.getElementById("title").textContent = song.title;
    document.getElementById("artist").textContent = song.artist;
}

function togglePlay() {
    if(playing) { audio.pause(); playBtn.textContent = "▶"; player.classList.remove("playing"); }
    else { audio.play(); playBtn.textContent = "⏸"; player.classList.add("playing"); }
    playing = !playing;
}

// --- CURSOR PERSONALIZADO ---
const cursor = document.getElementById("heartCursor");
document.addEventListener("mousemove", (e) => {
    cursor.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
    createParticle(e.clientX, e.clientY);
});

function createParticle(x, y) {
    const p = document.createElement("div");
    p.classList.add("heart-particle");
    p.style.left = x + "px"; p.style.top = y + "px";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
}

// --- TABS ---
const buttons = document.querySelectorAll('.menu span');
const tabs = document.querySelectorAll('.tab');

buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabs.forEach(t => t.classList.remove('active'));
        
        const id = btn.textContent.toLowerCase().replace('í', 'i');
        if(id.includes('perfil')) document.getElementById('perfil').classList.add('active');
        if(id.includes('amigos')) document.getElementById('amigos').classList.add('active');
        if(id.includes('galeria')) document.getElementById('galeria').classList.add('active');
    });
});

// --- EFEITO DIGITAÇÃO ---
const mainText = "Soy suficiente tal como soy...";
let mIdx = 0;
function typeMain() {
    if(mIdx < mainText.length) {
        document.getElementById("typing").innerHTML += mainText.charAt(mIdx);
        mIdx++; setTimeout(typeMain, 50);
    }
}

// --- MODAL MARRIED ---
function openMarried() {
    document.getElementById("marriedModal").classList.add("active");
    startTypingMarried();
}
document.getElementById("marriedModal").onclick = (e) => {
    if(e.target.id === "marriedModal") document.getElementById("marriedModal").classList.remove("active");
};

function startTypingMarried() {
    const el = document.getElementById("typingText");
    const msg = "Te quiero...";
    el.innerHTML = ""; let i = 0;
    function type() {
        if(i < msg.length) { el.innerHTML += msg.charAt(i); i++; setTimeout(type, 50); }
    }
    type();
}

// --- INTRO E INÍCIO ---
document.getElementById("enterBtn").addEventListener("click", () => {
    document.getElementById("intro").classList.add("hide");
    document.getElementById("mainWrapper").classList.add("show");
    loadSong(songs[0]);
    typeMain();
});

// --- GALERIA CARROSSEL ---
document.getElementById("mainCard").addEventListener("click", function() {
    this.style.display = "none";
    const carousel = document.getElementById("carousel");
    carousel.style.display = "block";
    const items = document.querySelectorAll(".item");
    items.forEach((item, i) => {
        const angle = (360 / items.length) * i;
        item.style.transform = `translate(-50%, -50%) rotateY(${angle}deg) translateZ(170px)`;
    });
    setTimeout(() => carousel.classList.add("active"), 500);
});

// Proteções
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
