<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cocacola</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #DEB887;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 60px 20px;
    }

    .background-image {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: url('');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
      filter: brightness(0.9);
    }

    .blob {
      position: absolute;
      width: 85%;
      height: 90%;
      background-color: #F5DEB3;
      border-radius: 58% 42% 30% 70% / 60% 30% 70% 40%;
      animation: morph 14s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes morph {
      0%, 100% {
        border-radius: 58% 42% 30% 70% / 60% 30% 70% 40%;
      }
      50% {
        border-radius: 40% 60% 60% 40% / 50% 60% 30% 60%;
      }
    }

    .content {
      z-index: 2;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #8B4513;
    }

    h1 {
      font-size: 4.5rem;
      margin-bottom: 10px;
      color: white;
      text-shadow: 3px 3px #8B4513;
    }

    .heart {
      font-size: 2.2rem;
      color: white;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 60px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      background: white;
      border-radius: 20px;
      width: 250px;
      height: 400px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.08);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:first-child {
      border-top: 15px solid #8B4513;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .title {
      font-weight: bold;
      font-size: 15px;
      color: #8B4513;
      margin-top: 8px;
      text-align: center;
    }

    .desc {
      font-size: 12px;
      color: #8B4513;
      margin-bottom: 8px;
      text-align: center;
    }

    .bottom-links {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .square-link {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      background: #8B4513;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 15px;
      color: white;
      transition: transform 0.2s ease;
    }

    .square-link:hover {
      transform: scale(1.2);
      background: #DEB887;
    }

    .fade-text-box {
      background: white;
      margin-top: 40px;
      padding: 12px 20px;
      border-radius: 15px;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .typing-wrapper {
      background:#8B4513;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      width: 100%;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
    }

    .typing-text {
      font-size: 13px;
      color: white;
      white-space: nowrap;
      border-right: 2px solid white;
      padding-right: 6px;
      overflow: hidden;
    }

    .custom-text {
      margin: 10px 0 5px;
      font-size: 13px;
      color: #8B4513;
      text-align: center;
    }

    @media (max-width: 768px) {
      .cards {
        flex-direction: column;
        gap: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="background-image"></div>

  <div class="container">
    <div class="blob"></div>

    <div class="content">
      <h1>`𝑪𝒐𝒄𝒂 𝑪𝒐𝒍𝒂~</h1>
      <div class="heart">♡</div>

      <div class="cards">
        <div class="card">
          <img src="https://xatimg.com/image/nF0Nz4W2HjwN.png" alt="Bunny Girl">
          <div class="title">~❀</div>
          <div class="desc">𝙸 𝙳 𝙸 𝙻 𝙸 𝙾</div>
        </div>

        <div class="card">
          <div class="typing-wrapper">
            <div class="typing-text" id="type-text"></div>
          </div>

          <img src="https://xatimg.com/image/fg5PNvUJKC3y.jpg" alt="Poniko Face" style="margin-top: 25px;">

          <div class="custom-text">Hᵰʏ ᴀʟɢᴏ ᴇɴ ʟᴏs ᴘʟᴀɴᴇᴛᴀs ⊹ ࣪ ˖⭑</div>

          <div class="bottom-links">
            <a href="https://xat.me/xTakis" class="square-link" target="_blank">♡</a>
            <a href="https://xatimg.com/image/5s9mgeykvOyW.png" class="square-link" target="_blank">[◎°]</a>
            <a href="https://xatimg.com/image/zyqXr0yhCaCi.png" class="square-link" target="_blank">[◎°]</a>
            <a href="https://xat.com/wanderful" class="square-link" target="_blank">⌂</a>
          </div>
        </div>
      </div>

      <div class="fade-text-box">
        By тaкιѕ™ <br>.. ᴹⁱ ᵃᵐᵒʳ ᵇᵒⁿⁱᵗᵒ ♡
      </div>
    </div>
  </div>

  <!-- Video YouTube invisible con sonido -->
  <div id="yt-player" style="width: 0; height: 0; overflow: hidden;"></div>
  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '0',
        width: '0',
        videoId: 'vAIPyUqxgjE',
        playerVars: {
          autoplay: 1,
          loop: 1,
          playlist: 'vAIPyUqxgjE',
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          mute: 0
        },
        events: {
          onReady: function (event) {
            event.target.playVideo();
          }
        }
      });
    }
  </script>

  <script>
    const el = document.getElementById("type-text");
    const text = "’ωᴏnᴇ˺";
    let index = 0;

    function typeEffect() {
      if (index < text.length) {
        el.textContent += text.charAt(index);
        index++;
        setTimeout(typeEffect, 120);
      } else {
        setTimeout(() => {
          el.textContent = "";
          index = 0;
          setTimeout(typeEffect, 500);
        }, 1500);
      }
    }

    typeEffect();
  </script>

</body>
</html>
