<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WRS Xatspace — Portfolio</title>
    <link rel="stylesheet" href="css/portfolio-minimal.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            /* Cursor restaurado aqui */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        #fondo-abstracto { position: fixed; inset: 0; z-index: -1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; }
        .logo-img { width: 40px; height: 40px; object-fit: cover; border-radius: 8px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00ffe5; }

        .nav a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .hero { text-align: center; padding: 60px 0; }
        .accent { color: #00ffe5; text-shadow: 0 0 10px rgba(0, 255, 229, 0.5); }

        .hero-cta { display: flex; align-items: center; justify-content: center; gap: 16px; }
        .btn-primary { background: #00ffe5; color: #000; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; }
        
        .married-box {
            width: 90px; height: 90px; border-radius: 22px;
            background: rgba(255, 0, 70, 0.12); border: 1px solid rgba(255, 0, 70, 0.35);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.35s;
        }
        .married-box i { color: #ff2d55; animation: heartBeat 1.6s infinite; }

        .vip-player {
            position: relative; width: 420px; margin: 40px auto; padding: 25px 20px;
            border-radius: 25px; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); text-align: center; height: 520px; overflow: hidden;
        }
        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .vip-content { position: relative; z-index: 1; }

        .compas img { width: 140px; height: 140px; border-radius: 50%; animation: spin 12s linear infinite; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; background: #00ffe5; border: none; cursor: pointer; }

        @keyframes heartBeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .married-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>
    <canvas id="fondo-abstracto"></canvas>
    <div class="container">
        <header class="header">
            <img src="https://xatimg.com/image/Pz4sE7OCoLkT.png" class="profile-img">
            <nav class="nav">
                <a href="#">Inicio</a>
                <a href="#">Fondos</a>
                <a href="#">GIF</a>
            </nav>
        </header>

        <section class="hero">
            <h1 class="hero-title" style="font-family: serif; font-size: 3rem;">WRS <span class="accent">Designer</span></h1>
            <div class="hero-cta">
                <a class="btn-primary" href="#">Explorar</a>
                <div class="married-box" id="openMarried">
                    <i class="fas fa-heart"></i>
                    <span style="font-size: 10px;">Married</span>
                </div>
            </div>
        </section>

        <div class="vip-player fondo-efecto-ondas">
            <canvas id="bgCanvas"></canvas>
            <div class="vip-content">
                <div class="compas" style="margin-bottom: 20px;"><img id="coverArt" src="portadas/caratula1.jpg"></div>
                <div id="songTitle" class="song-title">Carregando...</div>
                <div class="control-buttons" style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
                    <button id="prevBtn" class="circle-btn"><i class="fas fa-backward"></i></button>
                    <button id="playPauseBtn" class="circle-btn"><i class="fas fa-play"></i></button>
                    <button id="nextBtn" class="circle-btn"><i class="fas fa-forward"></i></button>
                </div>
            </div>
            <audio id="radioAudio"></audio>
        </div>
    </div>

    <div class="married-modal" id="marriedModal">
        <div style="background: #151515; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #ff2d55;">
            <button id="closeMarried" style="float: right; background: none; border: none; color: #fff; cursor: pointer;">&times;</button>
            <h2 style="color: #ff2d55;">Day</h2>
            <p>ID: 116447265</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>
    <script>
        $(document).ready(function() { $('.fondo-efecto-ondas').ripples({ resolution: 512, dropRadius: 20, perturbance: 0.01 }); });

        // Partículas
        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d");
        let w, h;
        function resize() { w = canvas.width = canvas.offsetWidth; h = canvas.height = canvas.offsetHeight; }
        window.onresize = resize; resize();
        const symbols = ["♪","♫","♬"];
        const notes = [];
        for(let i=0; i<15; i++) notes.push({ x: Math.random()*w, y: Math.random()*h, s: 0.5+Math.random(), sym: symbols[Math.floor(Math.random()*3)] });
        function anim() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "#00ffe5";
            notes.forEach(n => {
                ctx.fillText(n.sym, n.x, n.y);
                n.y += n.s; if(n.y > h) n.y = -10;
            });
            requestAnimationFrame(anim);
        }
        anim();

        // Modal
        document.getElementById('openMarried').onclick = () => document.getElementById('marriedModal').style.display = 'flex';
        document.getElementById('closeMarried').onclick = () => document.getElementById('marriedModal').style.display = 'none';

        // Proteção
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.ctrlKey && ['u','s','i','a'].includes(e.key)) e.preventDefault(); });
    </script>
</body>
</html>
