<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS — Pixel Perfect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET E CURSOR */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; cursor: none !important; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background: radial-gradient(circle at top, #f391b78f, #cc7894 70%); overflow: hidden; }

        /* INTRO */
        .intro { position:fixed; inset:0; background:#8f3c63; display:flex; justify-content:center; align-items:center; z-index:9999; transition:1s; }
        .intro.hide { opacity:0; pointer-events:none; }
        .enter-btn { padding:14px 40px; border-radius:30px; border:none; background:linear-gradient(90deg,#f579a8,#fc84b6); color:#fff; letter-spacing:2px; }

        /* WRAPPER E PROFILE */
        .wrapper { display:flex; align-items:center; gap:40px; position: relative; left: 150px; opacity:0; transition:1s; }
        .wrapper.show { opacity:1; }
        .profile { position:relative; width:390px; height:400px; padding:180px 10px 30px; border-radius:25px; background: rgba(235, 143, 181, 0.37); backdrop-filter: blur(25px); border:1px solid rgba(139, 21, 60, 0.075); box-shadow:0 30px 60px rgba(63, 33, 33, 0.7); color:#fff; }
        .avatar { position:absolute; top:-45px; left:-178px; width:200px; height:200px; border-radius:50%; border:21px solid #f3d3dfa1; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }

        /* TABS */
        .tab { display:none; animation: fade 0.5s ease forwards; }
        .tab.active { display:block; }
        @keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* GALERIA E ZOOM */
        .gallery-container { position:absolute; width:100%; top:-90px; display:flex; justify-content:center; perspective:1000px; }
        .item { cursor:pointer; transition: 0.3s; }
        .item img { width:100px; height:140px; border-radius:10px; object-fit:cover; border:2px solid rgba(255,255,255,0.2); }
        
        .zoom-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:10000; }
        .zoom-overlay.active { display:flex; }
        .zoom-overlay img { max-width:90%; max-height:80%; border-radius:15px; box-shadow:0 0 30px #f579a8; }
        .close-zoom { margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:#f579a8; color:#fff; }

        /* PLAYER ROSA */
        .player { position: relative; top:80px; left:-602px; width:170px; padding:16px 15px 20px; border-radius:80px 80px 30px 30px; background: rgba(226, 147, 173, 0.6); backdrop-filter: blur(25px); color:#fff; text-align:center; }
        .player img { width:75px; height:75px; border-radius:50%; object-fit:cover; border:6px solid #d47096; animation: spin 6s linear infinite; animation-play-state: paused; }
        .player.playing img { animation-play-state: running; }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

        /* CURSOR */
        #heartCursor { position: fixed; width: 30px; height: 30px; pointer-events: none; z-index: 999999; background: url("https://xatimg.com/image/YbX9tnbfzNya.png") no-repeat center; background-size: contain; transform: translate(-50%, -50%); }
        .heart-particle { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 999998; background: #f56e97; transform: rotate(45deg); animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { to { transform: translateY(-15px) scale(0.5) rotate(45deg); opacity: 0; } }

        .menu { position:absolute; top:-45px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background: rgba(241, 137, 177, 0.6); padding:6px; border-radius:26px; z-index:100; }
        .menu span { font-size:12px; opacity:0.6; padding:6px 14px; border-radius:20px; }
        .menu .active { background:linear-gradient(90deg,#f798bf,#db859f); opacity:1; }
    </style>
</head>
<body>

<div class="intro" id="intro">
    <button class="enter-btn" id="enterBtn">INGRESAR</button>
</div>

<div id="heartCursor"></div>

<div class="zoom-overlay" id="zoomOverlay">
    <img src="" id="zoomImg">
    <button class="close-zoom" onclick="closeZoom()">VOLTAR</button>
</div>

<div class="wrapper" id="mainWrapper">
    <div class="player" id="playerContainer">
        <img id="cover" src="https://xatimg.com/image/rQKnT3qeior8.jpg">
        <div style="font-size:10px; margin:10px 0;">Layton Greene<br><small>Leave Em Alone</small></div>
        <div class="controls">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:#fff; font-size:20px;">▶</button>
        </div>
        <audio id="audio" loop></audio>
    </div>

    <div class="profile">
        <div class="avatar"><img src="https://xatimg.com/image/lu7HFLMYZjSz.png"></div>
        <div class="menu" id="tabMenu">
            <span class="active" data-tab="perfil">PERFIL</span>
            <span data-tab="amigos">AMIGOS</span>
            <span data-tab="galeria">GALERÍA</span>
        </div>

        <div class="tab active" id="perfil">
            <h1 style="text-align:center; margin-top:-90px;">♥ 𝓨𝓪𝔃 ♥</h1>
            <p style="text-align:center; opacity:0.5;">Id: 666000</p>
        </div>

        <div class="tab" id="amigos">
            <p style="text-align:center; margin-top:-50px;">Lista de Amigos...</p>
        </div>

        <div class="tab" id="galeria">
            <div class="gallery-container">
                <div class="item" onclick="openZoom(this)"><img src="https://xatimg.com/image/grsS9Sc9mchR.png"></div>
                <div class="item" onclick="openZoom(this)" style="margin-left:10px;"><img src="https://xatimg.com/image/q1wHGSRCMb6h.png"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const playerCont = document.getElementById("playerContainer");

    // Tocar ao Ingressar
    document.getElementById("enterBtn").addEventListener("click", () => {
        document.getElementById("intro").classList.add("hide");
        document.getElementById("mainWrapper").classList.add("show");
        
        // Coloque aqui o link da sua música
        audio.src = "https://www.dropbox.com/scl/fi/seu-link-aqui.mp3?rlkey=...&st=...&dl=1";
        audio.play().then(() => {
            playerCont.classList.add("playing");
            playBtn.textContent = "⏸";
        });
    });

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.textContent = "⏸";
            playerCont.classList.add("playing");
        } else {
            audio.pause();
            playBtn.textContent = "▶";
            playerCont.classList.remove("playing");
        }
    }

    // Navegação das Abas
    const menuSpans = document.querySelectorAll('#tabMenu span');
    const tabs = document.querySelectorAll('.tab');

    menuSpans.forEach(span => {
        span.addEventListener('click', () => {
            menuSpans.forEach(s => s.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            
            span.classList.add('active');
            const target = span.getAttribute('data-tab');
            document.getElementById(target).classList.add('active');
        });
    });

    // Zoom da Galeria
    function openZoom(el) {
        const imgSrc = el.querySelector('img').src;
        document.getElementById("zoomImg").src = imgSrc;
        document.getElementById("zoomOverlay").classList.add("active");
    }

    function closeZoom() {
        document.getElementById("zoomOverlay").classList.remove("active");
    }

    // Cursor
    const cursor = document.getElementById("heartCursor");
    document.addEventListener("mousemove", (e) => {
        cursor.style.top = e.clientY + "px";
        cursor.style.left = e.clientX + "px";
        const p = document.createElement("div");
        p.classList.add("heart-particle");
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    });
</script>

</body>
</html>
