<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Anime</title>
<style>
    body {
        background-color: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        font-size: 2rem;
        margin-top: 20px;
    }
    .personajes {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 20px;
    }
    .personaje {
        cursor: pointer;
        border-radius: 10px;
        border: 2px solid transparent;
        overflow: hidden;
        width: 120px;
        text-align: center;
    }
    .personaje img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 10px;
    }
    .personaje.selected {
        border: 2px solid #ff00ff;
    }
    select, button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
    }
    button {
        background-color: #ff00ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
    button:hover {
        background-color: #cc00cc;
    }
    #juego-container {
        margin: 20px auto;
        display: none;
        flex-direction: column;
        align-items: center;
    }
    #puzzle {
        display: grid;
        gap: 2px;
        margin-top: 20px;
        background-color: #333;
    }
    .pieza {
        background-size: cover;
        cursor: grab;
    }
    #piezas-suelta {
        margin-top: 20px;
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
    }
    #piezas-suelta .pieza {
        width: 60px;
        height: 60px;
    }
    #info {
        margin-top: 15px;
    }
    footer {
        font-size: 12px;
        margin-top: 30px;
        color: #aaa;
        position: relative;
        padding-bottom: 30px; /* espacio para contador */
    }
    #contador-visitas {
        position: fixed;
        bottom: 5px;
        right: 10px;
        background: #ff69b4aa;
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 12px;
        color: white;
        font-family: "Comic Sans MS", cursive, sans-serif;
        user-select: none;
        box-shadow: 0 0 5px #ff69b4;
        z-index: 9999;
    }
</style>
</head>
<body>

<h1>Selecciona tu personaje</h1>
<div class="personajes" id="personajes"></div>

<h2>Selecciona dificultad</h2>
<select id="dificultad">
    <option value="3">Fácil (3x3)</option>
    <option value="4">Medio (4x4)</option>
    <option value="5">Difícil (5x5)</option>
    <option value="6">Experto (6x6)</option>
    <option value="7">Maestro (7x7)</option>
    <option value="8">Leyenda (8x8)</option>
</select>
<br />
<button id="jugar">Jugar</button>

<div id="juego-container">
    <div id="info">
        <p>Tiempo: <span id="tiempo">0</span> segundos | Movimientos: <span id="movimientos">0</span></p>
        <p>Récord Tiempo: <span id="recordTiempo">-</span> | Récord Movimientos: <span id="recordMov">-</span></p>
    </div>
    <div id="puzzle"></div>
    <div id="piezas-suelta"></div>
</div>

<footer>Juego diseñado por тaкιѕ™</footer>

<div id="contador-visitas">👾 Visitas: <span id="num-visitas">0</span></div>

<!-- Audios para éxito y error -->
<audio id="audio-success" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
<audio id="audio-error" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>

<!-- Audio para sonido de felicitaciones -->
<audio id="audio-felicidades" src="https://freesound.org/data/previews/270/270404_5121236-lq.mp3" preload="auto"></audio>

<script>
const personajesData = [
    { nombre: "Mitsuri", imagen: "https://xatimg.com/image/BjFxhV5ENFkH.jpg" },
    { nombre: "Momo", imagen: "https://xatimg.com/image/dSsz7VY5n0Bp.jpg" },
    { nombre: "Nezuko", imagen: "https://xatimg.com/image/CwcbT7MgkZ4M.jpg" },
    { nombre: "Kakashi", imagen: "https://xatimg.com/image/ULLyAwVAEOTx.jpg" },
    { nombre: "Obanai", imagen: "https://xatimg.com/image/KuQMRAIakIMr.jpg" },
    { nombre: "Satoru", imagen: "https://xatimg.com/image/HE10Z9YQP0H4.jpg" }
];

const personajesDiv = document.getElementById("personajes");
let personajeSeleccionado = null;
let tamaño = 3;
let movimientos = 0;
let tiempo = 0;
let timer;
let piezas = [];
let piezaSeleccionada = null;

let estadoTablero = [];

const audioSuccess = document.getElementById("audio-success");
const audioError = document.getElementById("audio-error");
const audioFelicidades = document.getElementById("audio-felicidades");

personajesData.forEach(p => {
    const div = document.createElement("div");
    div.classList.add("personaje");
    div.innerHTML = `<img src="${p.imagen}" alt="${p.nombre}"><p>${p.nombre}</p>`;
    div.addEventListener("click", () => {
        document.querySelectorAll(".personaje").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
        personajeSeleccionado = p.imagen;
    });
    personajesDiv.appendChild(div);
});

document.getElementById("jugar").addEventListener("click", () => {
    if (!personajeSeleccionado) {
        alert("Selecciona un personaje primero");
        return;
    }
    tamaño = parseInt(document.getElementById("dificultad").value);
    iniciarJuego();
});

function iniciarJuego() {
    document.getElementById("juego-container").style.display = "flex";
    movimientos = 0;
    tiempo = 0;
    piezaSeleccionada = null;
    document.getElementById("movimientos").textContent = movimientos;
    document.getElementById("tiempo").textContent = tiempo;
    clearInterval(timer);
    timer = setInterval(() => {
        tiempo++;
        document.getElementById("tiempo").textContent = tiempo;
    }, 1000);
    generarPiezas();
    generarTableroVacio();
    estadoTablero = new Array(tamaño * tamaño).fill(null).map(() => ({piezaId: null, correcta: false, piezaDiv: null}));
}

function generarPiezas() {
    const piezasDiv = document.getElementById("piezas-suelta");
    piezasDiv.innerHTML = "";
    piezas = [];

    for (let y = 0; y < tamaño; y++) {
        for (let x = 0; x < tamaño; x++) {
            piezas.push({x, y});
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    shuffle(piezas);

    piezas.forEach(({x, y}) => {
        const pieza = document.createElement("div");
        pieza.classList.add("pieza");
        pieza.style.width = `${300 / tamaño}px`;
        pieza.style.height = `${300 / tamaño}px`;
        pieza.style.backgroundImage = `url('${personajeSeleccionado}')`;
        pieza.style.backgroundSize = `${300}px ${300}px`;
        pieza.style.backgroundPosition = `-${(300 / tamaño) * x}px -${(300 / tamaño) * y}px`;
        pieza.dataset.id = `${x},${y}`;
        pieza.draggable = true;

        pieza.addEventListener("dragstart", e => {
            e.dataTransfer.setData("pieza-id", pieza.dataset.id);
            e.dataTransfer.setDragImage(pieza, 30, 30);
        });

        pieza.addEventListener("click", () => {
            if (piezaSeleccionada) {
                piezaSeleccionada.classList.remove("selected");
            }
            piezaSeleccionada = pieza;
            piezaSeleccionada.classList.add("selected");
        });

        piezasDiv.appendChild(pieza);
    });
}

function generarTableroVacio() {
    const puzzleDiv = document.getElementById("puzzle");
    puzzleDiv.innerHTML = "";
    puzzleDiv.style.gridTemplateColumns = `repeat(${tamaño}, ${300 / tamaño}px)`;
    puzzleDiv.style.gridTemplateRows = `repeat(${tamaño}, ${300 / tamaño}px)`;

    for (let i = 0; i < tamaño * tamaño; i++) {
        const celda = document.createElement("div");
        celda.style.width = `${300 / tamaño}px`;
        celda.style.height = `${300 / tamaño}px`;
        celda.style.border = "1px dashed #555";
        celda.dataset.index = i;

        celda.addEventListener("dragover", e => e.preventDefault());
        celda.addEventListener("drop", e => {
            e.preventDefault();
            colocarPiezaDrag(e, celda);
        });

        celda.addEventListener("click", () => {
            colocarPiezaClick(celda);
        });

        puzzleDiv.appendChild(celda);
    }
}

function piezaYaColocada(piezaId) {
    return estadoTablero.some(celda => celda.piezaId === piezaId);
}

function colocarPiezaDrag(e, celda) {
    const piezaId = e.dataTransfer.getData("pieza-id");
    if (!piezaId) return;

    const index = parseInt(celda.dataset.index);

    if (estadoTablero[index].correcta) return;

    if (piezaYaColocada(piezaId)) return;

    if (estadoTablero[index].piezaDiv && !estadoTablero[index].correcta) {
        devolverPiezaASeleccion(estadoTablero[index].piezaDiv);
    }

    eliminarPiezaDeSeleccion(piezaId);

    const [x, y] = piezaId.split(",").map(Number);
    colocarPiezaEnCelda(celda, x, y, index, piezaId);
}

function colocarPiezaClick(celda) {
    const index = parseInt(celda.dataset.index);

    if (estadoTablero[index].correcta) return;
    if (!piezaSeleccionada) return;

    const piezaId = piezaSeleccionada.dataset.id;

    if (piezaYaColocada(piezaId)) return;

    if (estadoTablero[index].piezaDiv && !estadoTablero[index].correcta) {
        devolverPiezaASeleccion(estadoTablero[index].piezaDiv);
    }

    eliminarPiezaDeSeleccion(piezaId);

    const [x, y] = piezaId.split(",").map(Number);
    colocarPiezaEnCelda(celda, x, y, index, piezaId);

    piezaSeleccionada.classList.remove("selected");
    piezaSeleccionada = null;
}

function colocarPiezaEnCelda(celda, x, y, index, piezaId) {
    celda.style.backgroundImage = `url('${personajeSeleccionado}')`;
    celda.style.backgroundSize = `${300}px ${300}px`;
    celda.style.backgroundPosition = `-${(300 / tamaño) * x}px -${(300 / tamaño) * y}px`;

    const filaCorrecta = Math.floor(index / tamaño);
    const colCorrecta = index % tamaño;
    const esCorrecta = (x === colCorrecta && y === filaCorrecta);

    estadoTablero[index] = {piezaId, correcta: esCorrecta, piezaDiv: celda};

    if (esCorrecta) {
        audioSuccess.currentTime = 0;
        audioSuccess.play();
    } else {
        audioError.currentTime = 0;
        audioError.play();
    }

    movimientos++;
    document.getElementById("movimientos").textContent = movimientos;

    verificarVictoria();
}

function eliminarPiezaDeSeleccion(piezaId) {
    const piezasDiv = document.getElementById("piezas-suelta");
    const piezas = piezasDiv.querySelectorAll(".pieza");
    piezas.forEach(pieza => {
        if (pieza.dataset.id === piezaId) {
            pieza.remove();
        }
    });
}

function devolverPiezaASeleccion(celdaPieza) {
    if (!celdaPieza) return;

    const piezaId = estadoTablero.find(c => c.piezaDiv === celdaPieza)?.piezaId;
    if (!piezaId) return;

    celdaPieza.style.backgroundImage = "";
    celdaPieza.style.backgroundPosition = "";
    celdaPieza.style.backgroundSize = "";
    
    const index = parseInt(celdaPieza.dataset.index);
    estadoTablero[index] = {piezaId: null, correcta: false, piezaDiv: null};

    const [x, y] = piezaId.split(",").map(Number);
    const piezasDiv = document.getElementById("piezas-suelta");

    const pieza = document.createElement("div");
    pieza.classList.add("pieza");
    pieza.style.width = `${300 / tamaño}px`;
    pieza.style.height = `${300 / tamaño}px`;
    pieza.style.backgroundImage = `url('${personajeSeleccionado}')`;
    pieza.style.backgroundSize = `${300}px ${300}px`;
    pieza.style.backgroundPosition = `-${(300 / tamaño) * x}px -${(300 / tamaño) * y}px`;
    pieza.dataset.id = piezaId;
    pieza.draggable = true;

    pieza.addEventListener("dragstart", e => {
        e.dataTransfer.setData("pieza-id", pieza.dataset.id);
        e.dataTransfer.setDragImage(pieza, 30, 30);
    });

    pieza.addEventListener("click", () => {
        if (piezaSeleccionada) {
            piezaSeleccionada.classList.remove("selected");
        }
        piezaSeleccionada = pieza;
        piezaSeleccionada.classList.add("selected");
    });

    piezasDiv.appendChild(pieza);
}

function verificarVictoria() {
    const completadas = estadoTablero.filter(c => c.correcta).length;
    if (completadas === tamaño * tamaño) {
        clearInterval(timer);
        audioFelicidades.currentTime = 0;
        audioFelicidades.play();
        alert("¡Felicidades lo haz logrado!");
        guardarRecord();
    }
}

function guardarRecord() {
    const mejorTiempo = localStorage.getItem("recordTiempo") || Infinity;
    const mejorMov = localStorage.getItem("recordMov") || Infinity;
    if (tiempo < mejorTiempo) localStorage.setItem("recordTiempo", tiempo);
    if (movimientos < mejorMov) localStorage.setItem("recordMov", movimientos);
    mostrarRecord();
}

function mostrarRecord() {
    document.getElementById("recordTiempo").textContent = localStorage.getItem("recordTiempo") || "-";
    document.getElementById("recordMov").textContent = localStorage.getItem("recordMov") || "-";
}

// Contador visitas simulado con localStorage
function contadorVisitas() {
    let visitas = localStorage.getItem("contadorVisitas");
    visitas = visitas ? parseInt(visitas) + 1 : 1;
    localStorage.setItem("contadorVisitas", visitas);
    document.getElementById("num-visitas").textContent = visitas;
}

contadorVisitas();

mostrarRecord();
</script>

</body>
</html>
